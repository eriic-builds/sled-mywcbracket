name: Sync World Cup results

# Pulls finished-game results from FIFA's free public feed and writes the shared
# docs/data/results.json. The fan-viewer page is static and renders client-side, so
# there is no HTML to rebuild — the browser fetches results.json directly.
on:
  schedule:
    - cron: "0 22 * * *"   # ~6:00 PM ET  (daily baseline)
    - cron: "30 1 * * *"   # ~9:30 PM ET  (daily baseline)
    - cron: "0 6 * * *"    # ~2:00 AM ET  (daily baseline)
    # Dense match-window syncs, every 30 min across the knockout kickoff hours.
    # The job gates these to the knockout window (Jun 27 - Jul 19) so quiet days
    # keep only the 3 baseline runs above.
    - cron: "*/30 16-23 * * *"
    - cron: "*/30 0-3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write
  issues: write

concurrency:
  group: sync-results
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Gate dense runs to the knockout window
        id: gate
        run: |
          sched="${{ github.event.schedule }}"
          today=$(date -u +%m-%d)
          dense=false
          if [ "$sched" = "*/30 16-23 * * *" ] || [ "$sched" = "*/30 0-3 * * *" ]; then dense=true; fi
          in_window=false
          if [[ "$today" > "06-26" && "$today" < "07-20" ]]; then in_window=true; fi
          if [ "$dense" = "true" ] && [ "$in_window" = "false" ]; then
            echo "Dense run outside the knockout window (Jun 27 - Jul 19). Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Fetch results into docs/data/results.json
        if: steps.gate.outputs.skip != 'true'
        run: python scripts/fetch_results.py

      - name: Validate results before committing
        if: steps.gate.outputs.skip != 'true'
        run: python scripts/validate_results.py

      - name: Commit and push if results changed
        id: commit
        if: steps.gate.outputs.skip != 'true'
        run: |
          if [[ -n "$(git status --porcelain docs/data/results.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/data/results.json
            git commit -m "chore: auto-sync World Cup results"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes — results already current."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages deploy
        # Pushes made with the built-in GITHUB_TOKEN never fire other workflows'
        # push triggers (GitHub's anti-recursion safeguard), so the commit above
        # would never kick off deploy-pages.yml on its own. Dispatch it explicitly
        # instead (requires actions: write in the permissions block above).
        if: steps.gate.outputs.skip != 'true' && steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --ref "${{ github.ref_name }}"

      - name: Open an issue if the sync failed
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Sync failed: $(date -u +%Y-%m-%d) run"
          run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          existing=$(gh issue list --state open --search "Sync failed in:title" --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Another sync failure: $run_url"
          else
            gh issue create --title "$title" --body "Run: $run_url — usually a transient feed outage."
          fi
