name: Sync World Cup results

# Pulls finished-game results from FIFA's free public feed, refreshes match details,
# and discovers verified data portraits. The fan-viewer page is static and renders
# client-side, so there is no HTML to rebuild.
on:
  schedule:
    # Final scheduled auto-sync only:
    # Jul 19, 2026 2:22 PM PT == 21:22 UTC
    - cron: "22 21 19 7 *"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write
  issues: write

concurrency:
  group: sync-results
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Gate dense runs to the knockout window
        id: gate
        run: |
          # Keep this as a one-time scheduled sync in 2026 (not a yearly repeat).
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Non-scheduled run (workflow_dispatch). Proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          today=$(date -u +%Y-%m-%d)
          if [ "$today" != "2026-07-19" ]; then
            echo "Scheduled sync outside the final date (2026-07-19). Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Fetch results, details, and portraits
        if: steps.gate.outputs.skip != 'true'
        run: python scripts/fetch_results.py

      - name: Validate generated data before committing
        if: steps.gate.outputs.skip != 'true'
        run: |
          python scripts/validate_results.py
          python scripts/validate_match_details.py

      - name: Commit and push if generated data changed
        id: commit
        if: steps.gate.outputs.skip != 'true'
        run: |
          if [[ -n "$(git status --porcelain docs/data/results.json docs/data/match-details.json docs/data/match-portraits.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/data/results.json docs/data/match-details.json docs/data/match-portraits.json
            git commit -m "chore: auto-sync World Cup match data"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes — generated data already current."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages deploy
        # Pushes made with the built-in GITHUB_TOKEN never fire other workflows'
        # push triggers (GitHub's anti-recursion safeguard), so the commit above
        # would never kick off deploy-pages.yml on its own. Dispatch it explicitly
        # instead (requires actions: write in the permissions block above).
        if: steps.gate.outputs.skip != 'true' && steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --ref "${{ github.ref_name }}"

      - name: Open an issue if the sync failed
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Sync failed: $(date -u +%Y-%m-%d) run"
          run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          existing=$(gh issue list --state open --search "Sync failed in:title" --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Another sync failure: $run_url"
          else
            gh issue create --title "$title" --body "Run: $run_url — usually a transient feed outage."
          fi
